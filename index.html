<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三国志探险 · 游戏分享</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   VIEWPORT FITTING: MANDATORY BASE
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow-x: hidden;
}

html {
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

.slide {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  position: relative;
}

:root {
  --title-size:   clamp(2rem,    7vw,  5.5rem);
  --h2-size:      clamp(1.25rem, 3.5vw, 2.5rem);
  --h3-size:      clamp(1rem,    2.5vw, 1.75rem);
  --body-size:    clamp(0.8rem,  1.5vw, 1.1rem);
  --small-size:   clamp(0.65rem, 1vw,   0.85rem);
  --slide-pad:    clamp(1.5rem,  5vw,   6rem);

  /* 古风游戏配色 */
  --ink:          #0e0b07;
  --ink-mid:      #1c1610;
  --ink-light:    #2a1f14;
  --gold:         #d4a017;
  --gold-bright:  #f5c842;
  --gold-dim:     #8a6a10;
  --red:          #c0392b;
  --red-bright:   #e74c3c;
  --ivory:        #f2e8d0;
  --ivory-dim:    #c8b88a;
  --white:        #fff8ee;
}

@media (max-height: 700px) {
  :root {
    --title-size: clamp(1.5rem, 5vw, 3rem);
    --h2-size:    clamp(1rem, 3vw, 1.75rem);
    --slide-pad:  clamp(1rem, 3vw, 2.5rem);
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.2s !important;
  }
  html { scroll-behavior: auto; }
}

/* ============================================
   SHARED DECORATIVE ELEMENTS
   ============================================ */

/* 水墨晕染背景层 */
.ink-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 50%, rgba(139,90,30,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 30%, rgba(192,57,43,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 100%, rgba(0,0,0,0.5) 0%, transparent 70%),
    linear-gradient(160deg, #130f08 0%, #1a1208 40%, #0e0b07 100%);
  pointer-events: none;
}

/* 金色竖线装饰 */
.gold-rule {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--gold-dim) 30%, var(--gold) 50%, var(--gold-dim) 70%, transparent);
  opacity: 0.4;
  pointer-events: none;
}

/* 印章 SVG */
.seal {
  font-family: 'Noto Serif SC', serif;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--red);
  color: var(--red);
  font-weight: 700;
  letter-spacing: 0.05em;
  position: relative;
}
.seal::before {
  content: '';
  position: absolute;
  inset: 2px;
  border: 1px solid var(--red);
  opacity: 0.4;
}

/* 进度导航 */
.nav-dots {
  position: fixed;
  right: clamp(12px, 2vw, 24px);
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 100;
}
.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold-dim);
  border: 1px solid var(--gold-dim);
  cursor: pointer;
  transition: all 0.3s;
}
.nav-dot.active {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 8px var(--gold);
  transform: scale(1.4);
}

/* 键盘提示 */
.key-hint {
  position: fixed;
  bottom: clamp(12px, 2vh, 24px);
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: var(--small-size);
  color: var(--gold-dim);
  letter-spacing: 0.1em;
  z-index: 100;
  opacity: 0.6;
}

/* 页码 */
.slide-num {
  position: absolute;
  bottom: clamp(16px, 3vh, 32px);
  right: clamp(20px, 3vw, 48px);
  font-family: 'Noto Serif SC', serif;
  font-size: var(--small-size);
  color: var(--gold-dim);
  letter-spacing: 0.15em;
  z-index: 10;
}

/* ============================================
   SLIDE 1 — 封面
   ============================================ */
#slide-1 { background: var(--ink); }

#slide-1 .ink-bg {
  background:
    radial-gradient(ellipse 90% 70% at 10% 60%, rgba(139,90,20,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 90% 20%, rgba(192,57,43,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 50% 110%, rgba(212,160,23,0.08) 0%, transparent 60%),
    linear-gradient(145deg, #0a0805 0%, #16100a 50%, #0e0b07 100%);
}

/* 山形剪影 SVG 装饰 */
.mountain-deco {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 45%;
  pointer-events: none;
  opacity: 0.18;
}

/* 战旗装饰 */
.banner-deco {
  position: absolute;
  top: 0;
  right: clamp(60px, 10vw, 140px);
  width: clamp(24px, 3vw, 40px);
  height: clamp(80px, 14vh, 140px);
  background: linear-gradient(to bottom, var(--red) 0%, rgba(192,57,43,0.4) 100%);
  pointer-events: none;
}
.banner-deco::after {
  content: '魏';
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(10px, 1.2vw, 16px);
  color: var(--ivory);
  writing-mode: vertical-rl;
  letter-spacing: 0.2em;
}
.banner-deco-2 {
  right: calc(clamp(60px, 10vw, 140px) + clamp(30px, 4vw, 56px));
  background: linear-gradient(to bottom, #2d6a2d 0%, rgba(45,106,45,0.4) 100%);
}
.banner-deco-2::after { content: '蜀'; color: var(--ivory); }
.banner-deco-3 {
  right: calc(clamp(60px, 10vw, 140px) + clamp(60px, 8vw, 112px));
  background: linear-gradient(to bottom, #1a3a6a 0%, rgba(26,58,106,0.4) 100%);
}
.banner-deco-3::after { content: '吴'; color: var(--ivory); }

.s1-content {
  position: relative;
  z-index: 5;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
  padding: var(--slide-pad);
  padding-right: calc(var(--slide-pad) * 2);
}

.s1-eyebrow {
  font-family: 'Noto Serif SC', serif;
  font-size: var(--small-size);
  color: var(--gold);
  letter-spacing: 0.35em;
  margin-bottom: clamp(12px, 2vh, 24px);
  opacity: 0;
  animation: fadeUp 0.8s ease 0.3s forwards;
}

.s1-title {
  font-family: 'Noto Serif SC', serif;
  font-size: var(--title-size);
  font-weight: 900;
  color: var(--ivory);
  line-height: 1.1;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 20px rgba(212,160,23,0.3), 0 0 60px rgba(212,160,23,0.15);
  opacity: 0;
  animation: fadeUp 0.9s ease 0.5s forwards;
}

.s1-title span {
  color: var(--gold-bright);
  text-shadow: 0 0 30px rgba(245,200,66,0.5), 0 2px 20px rgba(212,160,23,0.4);
}

.s1-rule {
  width: clamp(40px, 8vw, 100px);
  height: 1px;
  background: linear-gradient(to right, var(--gold), transparent);
  margin: clamp(12px, 2.5vh, 28px) 0;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.7s forwards;
}

.s1-subtitle {
  font-family: 'Noto Serif SC', serif;
  font-size: var(--h2-size);
  color: var(--ivory-dim);
  font-weight: 400;
  letter-spacing: 0.12em;
  line-height: 1.4;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.9s forwards;
}

.s1-desc {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: var(--body-size);
  color: rgba(194,184,138,0.7);
  margin-top: clamp(10px, 2vh, 20px);
  letter-spacing: 0.08em;
  line-height: 1.7;
  max-width: 60ch;
  opacity: 0;
  animation: fadeUp 0.8s ease 1.1s forwards;
}

.s1-author {
  margin-top: clamp(24px, 4vh, 48px);
  display: flex;
  align-items: center;
  gap: clamp(12px, 2vw, 24px);
  opacity: 0;
  animation: fadeUp 0.8s ease 1.3s forwards;
}

.s1-author-box {
  border: 1px solid var(--gold-dim);
  padding: clamp(6px, 1vh, 10px) clamp(14px, 2vw, 22px);
  font-family: 'Noto Serif SC', serif;
  font-size: var(--small-size);
  color: var(--gold-dim);
  letter-spacing: 0.2em;
}

.s1-seal {
  width: clamp(44px, 5vw, 64px);
  height: clamp(44px, 5vw, 64px);
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.1em;
  writing-mode: vertical-rl;
}

/* ============================================
   SLIDE 2 — 为什么要做这件事
   ============================================ */
#slide-2 { background: var(--ink-mid); }

#slide-2 .ink-bg {
  background:
    radial-gradient(ellipse 70% 50% at 0% 50%, rgba(139,90,20,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 100% 80%, rgba(192,57,43,0.07) 0%, transparent 55%),
    linear-gradient(165deg, #1a1208 0%, #120e07 100%);
}

.s2-content {
  position: relative;
  z-index: 5;
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100%;
  padding: var(--slide-pad);
  gap: clamp(16px, 3vh, 32px);
}

.s2-header {
  display: flex;
  align-items: baseline;
  gap: clamp(12px, 2vw, 24px);
  opacity: 0;
  animation: fadeUp 0.7s ease 0.2s forwards;
}

.s2-num {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(2rem, 5vw, 4rem);
  color: var(--gold-dim);
  font-weight: 900;
  line-height: 1;
  opacity: 0.4;
}

.s2-title {
  font-family: 'Noto Serif SC', serif;
  font-size: var(--h2-size);
  color: var(--ivory);
  font-weight: 700;
  letter-spacing: 0.06em;
  border-left: 3px solid var(--gold);
  padding-left: clamp(12px, 1.5vw, 20px);
}

/* 两栏对比 */
.s2-body {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: clamp(12px, 2vw, 24px);
  align-items: center;
}

.s2-col {
  padding: clamp(16px, 2.5vh, 28px) clamp(16px, 2vw, 24px);
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: clamp(10px, 1.5vh, 18px);
  opacity: 0;
}

.s2-col-left {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  animation: fadeUp 0.7s ease 0.5s forwards;
}

.s2-col-right {
  background: rgba(212,160,23,0.07);
  border: 1px solid rgba(212,160,23,0.2);
  border-radius: 4px;
  animation: fadeUp 0.7s ease 0.7s forwards;
}

.s2-col-label {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: var(--small-size);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-weight: 700;
}
.s2-col-left .s2-col-label { color: rgba(194,184,138,0.5); }
.s2-col-right .s2-col-label { color: var(--gold); }

.s2-col-items {
  display: flex;
  flex-direction: column;
  gap: clamp(8px, 1.2vh, 14px);
}

.s2-item {
  display: flex;
  align-items: flex-start;
  gap: clamp(8px, 1vw, 14px);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: var(--body-size);
  color: var(--ivory-dim);
  line-height: 1.5;
}

.s2-col-right .s2-item { color: var(--ivory); }

.s2-item-icon {
  flex-shrink: 0;
  margin-top: 2px;
  font-size: clamp(14px, 1.5vw, 18px);
}

/* 中间分隔 */
.s2-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fadeIn 0.6s ease 0.9s forwards;
}

.s2-arrow {
  font-size: clamp(18px, 2.5vw, 28px);
  color: var(--gold);
  text-shadow: 0 0 16px rgba(212,160,23,0.6);
}

.s2-vs {
  font-family: 'Noto Serif SC', serif;
  font-size: var(--small-size);
  color: var(--gold-dim);
  writing-mode: vertical-rl;
  letter-spacing: 0.2em;
}

/* 底部核心理念 */
.s2-belief {
  text-align: center;
  padding: clamp(12px, 2vh, 20px) clamp(20px, 3vw, 36px);
  background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(212,160,23,0.1));
  border-top: 1px solid rgba(212,160,23,0.2);
  border-bottom: 1px solid rgba(212,160,23,0.2);
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeUp 0.8s ease 1.1s forwards;
}

.s2-belief::before, .s2-belief::after {
  content: '◆';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold-dim);
  font-size: clamp(10px, 1.2vw, 14px);
  opacity: 0.5;
}
.s2-belief::before { left: clamp(12px, 2vw, 24px); }
.s2-belief::after  { right: clamp(12px, 2vw, 24px); }

.s2-belief-text {
  font-family: 'Noto Serif SC', serif;
  font-size: var(--h3-size);
  font-weight: 700;
  color: var(--ivory);
  letter-spacing: 0.2em;
}

.s2-belief-text em {
  font-style: normal;
  color: var(--gold-bright);
  text-shadow: 0 0 20px rgba(245,200,66,0.4);
}

/* ============================================
   KEYFRAMES
   ============================================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.7; }
}

/* 金色粒子光晕 */
.glow-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  animation: flicker 6s ease-in-out infinite;
}
</style>
</head>
<body>

<!-- 导航点 -->
<nav class="nav-dots" aria-label="幻灯片导航">
  <div class="nav-dot active" data-slide="0" onclick="goTo(0)" title="封面"></div>
  <div class="nav-dot" data-slide="1" onclick="goTo(1)" title="出发点"></div>
</nav>

<p class="key-hint">← → 方向键 · 滚轮 · 滑动翻页</p>

<!-- ==================== SLIDE 1 ==================== -->
<section class="slide" id="slide-1" aria-label="封面">
  <div class="ink-bg"></div>

  <!-- 光晕装饰 -->
  <div class="glow-orb" style="width:300px;height:300px;background:rgba(212,160,23,0.12);top:-60px;left:-80px;animation-delay:0s"></div>
  <div class="glow-orb" style="width:200px;height:200px;background:rgba(192,57,43,0.1);bottom:80px;right:20%;animation-delay:2s"></div>

  <!-- 竖线装饰 -->
  <div class="gold-rule" style="left: clamp(40px, 7vw, 100px)"></div>

  <!-- 山水剪影 SVG -->
  <svg class="mountain-deco" viewBox="0 0 1440 300" preserveAspectRatio="xMidYMax meet" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M0 300 L0 200 Q100 100 200 180 Q300 240 400 120 Q500 20 600 80 Q700 140 800 60 Q900 0 1000 80 Q1100 150 1200 100 Q1320 50 1440 120 L1440 300 Z" fill="url(#mtn-grad)"/>
    <path d="M0 300 L0 250 Q200 180 400 220 Q600 260 800 200 Q1000 150 1200 210 Q1320 240 1440 200 L1440 300 Z" fill="url(#mtn-grad2)" opacity="0.6"/>
    <defs>
      <linearGradient id="mtn-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#8b5a1e" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#3d2810" stop-opacity="0.3"/>
      </linearGradient>
      <linearGradient id="mtn-grad2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5a3a12" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#1c1008" stop-opacity="0.2"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- 战旗 -->
  <div class="banner-deco" aria-hidden="true"></div>
  <div class="banner-deco banner-deco-2" aria-hidden="true"></div>
  <div class="banner-deco banner-deco-3" aria-hidden="true"></div>

  <!-- 正文 -->
  <div class="s1-content">
    <p class="s1-eyebrow">游戏开发分享</p>

    <h1 class="s1-title">
      三国志<span>探险</span>
    </h1>

    <div class="s1-rule"></div>

    <p class="s1-subtitle">让历史知识好玩起来</p>

    <p class="s1-desc">
      一款以三国知识为内核，以多元玩法为载体的 H5 手游
    </p>

    <div class="s1-author">
      <div class="s1-author-box">
        制作者 &nbsp;／&nbsp; ___________
      </div>
      <div class="seal s1-seal">游戏<br>制作</div>
    </div>
  </div>

  <div class="slide-num">01 / 02</div>
</section>

<!-- ==================== SLIDE 2 ==================== -->
<section class="slide" id="slide-2" aria-label="为什么要做这件事">
  <div class="ink-bg"></div>

  <div class="glow-orb" style="width:250px;height:250px;background:rgba(212,160,23,0.08);top:30%;right:-50px;animation-delay:1s"></div>

  <div class="gold-rule" style="left: clamp(40px, 7vw, 100px)"></div>
  <div class="gold-rule" style="right: clamp(40px, 7vw, 100px)"></div>

  <div class="s2-content">

    <!-- 标题 -->
    <div class="s2-header">
      <span class="s2-num">01</span>
      <h2 class="s2-title">为什么要做这件事？</h2>
    </div>

    <!-- 两栏对比 -->
    <div class="s2-body">

      <!-- 左栏：传统方式 -->
      <div class="s2-col s2-col-left">
        <p class="s2-col-label">传统学习方式</p>
        <div class="s2-col-items">
          <div class="s2-item">
            <span class="s2-item-icon">📖</span>
            <span>读书、看剧，<strong style="color:var(--ivory)">被动接受</strong>信息</span>
          </div>
          <div class="s2-item">
            <span class="s2-item-icon">😵</span>
            <span>人物繁杂、典故密集，<strong style="color:var(--ivory)">难以记忆</strong></span>
          </div>
          <div class="s2-item">
            <span class="s2-item-icon">⏳</span>
            <span>缺乏反馈，<strong style="color:var(--ivory)">兴趣难以持续</strong></span>
          </div>
        </div>
      </div>

      <!-- 中间箭头 -->
      <div class="s2-divider" aria-hidden="true">
        <span class="s2-vs">转变</span>
        <span class="s2-arrow">➤</span>
      </div>

      <!-- 右栏：游戏化方式 -->
      <div class="s2-col s2-col-right">
        <p class="s2-col-label">游戏化学习</p>
        <div class="s2-col-items">
          <div class="s2-item">
            <span class="s2-item-icon">🎮</span>
            <span>把知识嵌入玩法，玩家<strong style="color:var(--gold-bright)">主动调用</strong>它</span>
          </div>
          <div class="s2-item">
            <span class="s2-item-icon">⚔️</span>
            <span>答题闯关、占城争霸，<strong style="color:var(--gold-bright)">在行动中记忆</strong></span>
          </div>
          <div class="s2-item">
            <span class="s2-item-icon">🏆</span>
            <span>即时奖励与排名，<strong style="color:var(--gold-bright)">持续激励</strong>回来</span>
          </div>
        </div>
      </div>

    </div>

    <!-- 核心理念 -->
    <div class="s2-belief">
      <p class="s2-belief-text">
        <em>学习</em>是内核 &nbsp;·&nbsp; <em>游戏</em>是载体
      </p>
    </div>

  </div>

  <div class="slide-num">02 / 02</div>
</section>

<script>
// ============================================
// PRESENTATION CONTROLLER
// ============================================
const slides = Array.from(document.querySelectorAll('.slide'));
const dots   = Array.from(document.querySelectorAll('.nav-dot'));
let current  = 0;
let animating = false;

function goTo(index) {
  if (index < 0 || index >= slides.length || animating) return;
  animating = true;
  current = index;
  slides[index].scrollIntoView({ behavior: 'smooth' });
  dots.forEach((d, i) => d.classList.toggle('active', i === index));
  setTimeout(() => { animating = false; }, 700);
}

// 键盘导航
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === 'PageDown') {
    e.preventDefault(); goTo(current + 1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
    e.preventDefault(); goTo(current - 1);
  }
});

// 滚轮导航
let wheelCooldown = false;
document.addEventListener('wheel', e => {
  if (wheelCooldown) return;
  wheelCooldown = true;
  goTo(e.deltaY > 0 ? current + 1 : current - 1);
  setTimeout(() => { wheelCooldown = false; }, 800);
}, { passive: true });

// 触摸/滑动
let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dy = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 50) goTo(dy > 0 ? current + 1 : current - 1);
}, { passive: true });

// Intersection Observer 同步导航点
const obs = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const idx = slides.indexOf(entry.target);
      if (idx !== -1) {
        current = idx;
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      }
    }
  });
}, { threshold: 0.6 });

slides.forEach(s => obs.observe(s));
</script>
